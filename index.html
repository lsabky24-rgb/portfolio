<!DOCTYPE html><html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>کافی نت آنلاین علی‌آباد</title><style>
body{
margin:0;
font-family:tahoma;
background:#f1f5f9;
}

header{
background:#2563eb;
color:white;
padding:25px;
text-align:center;
}

.container{
max-width:900px;
margin:auto;
padding:15px;
}

.card{
background:white;
padding:15px;
margin:10px 0;
border-radius:12px;
box-shadow:0 0 10px rgba(0,0,0,.1);
}

input,select{
width:100%;
padding:10px;
margin:5px 0;
border-radius:8px;
border:1px solid #ccc;
}

button{
width:100%;
padding:10px;
margin-top:10px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

.admin{
background:#111827;
color:white;
padding:10px;
border-radius:10px;
margin-top:20px;
}

.item{
background:#f8fafc;
padding:10px;
margin:5px 0;
border-radius:8px;
}
</style></head><body><header>
<h2>کافی نت آنلاین علی‌آباد</h2>
<p>ثبت درخواست خدمات اینترنتی</p>
</header><div class="container"><div class="card">
<h3>ثبت درخواست</h3><input id="name" placeholder="نام">
<input id="phone" placeholder="شماره">
<select id="service">
<option>ثبت نام اینترنتی</option>
<option>بانکی</option>
<option>بیمه</option>
<option>مالیاتی</option>
<option>قضایی</option>
<option>سایر</option>
</select><button onclick="addRequest()">ثبت درخواست</button>

</div><div class="card">
<h3>پنل مدیریت</h3>
<input id="pass" type="password" placeholder="رمز">
<button onclick="login()">ورود</button><div id="adminPanel" style="display:none" class="admin">
<h4>درخواست‌ها</h4>
<div id="list"></div>
</div>
</div></div><script>

let requests = JSON.parse(localStorage.getItem("req") || "[]");

function addRequest(){
let name = document.getElementById("name").value;
let phone = document.getElementById("phone").value;
let service = document.getElementById("service").value;

requests.push({name,phone,service});
localStorage.setItem("req",JSON.stringify(requests));

alert("درخواست ثبت شد");
}

function login(){
let p = document.getElementById("pass").value;
if(p=="1234"){
document.getElementById("adminPanel").style.display="block";
show();
}else{
alert("رمز اشتباه");
}
}

function show(){
let list = document.getElementById("list");
list.innerHTML="";

requests.forEach((r,i)=>{
list.innerHTML += `
<div class="item">
<b>${r.name}</b><br>
${r.phone}<br>
${r.service}<br>
<button onclick="del(${i})">حذف</button>
</div>
`;
});
}

function del(i){
requests.splice(i,1);
localStorage.setItem("req",JSON.stringify(requests));
show();
}

</script></body>
</html>
